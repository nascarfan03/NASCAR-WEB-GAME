<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASCAR 3D Racing Game Engine</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 100;
        }
        
        #stats {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
        }
        
        .stat-row {
            margin: 5px 0;
        }
        
        .stat-label {
            color: #00ff00;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>NASCAR 3D Racing Engine</h2>
        <p>Loading...</p>
    </div>
    
    <div id="stats">
        <div class="stat-row"><span class="stat-label">Speed:</span> <span id="speed">0</span> km/h</div>
        <div class="stat-row"><span class="stat-label">RPM:</span> <span id="rpm">0</span></div>
        <div class="stat-row"><span class="stat-label">Damage:</span> <span id="damage">0</span>%</div>
        <div class="stat-row"><span class="stat-label">Position:</span> <span id="position">0, 0, 0</span></div>
    </div>
    
    <div id="controls">
        <strong>Controls:</strong><br>
        W/A/S/D - Move<br>
        Space - Brake<br>
        Shift - Nitro<br>
        R - Reset<br>
        P - Pause<br>
        Mouse - Look Around
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.20.0/build/cannon.js"></script>
    <script src="./engine/scene.js"></script>
    <script src="./engine/physics.js"></script>
    <script src="./engine/car.js"></script>
    <script src="./engine/track.js"></script>
    <script src="./engine/input.js"></script>
    <script src="./engine/game.js"></script>
</body>
</html>
